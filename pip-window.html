<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter PiP</title>
    <style>
        :root {
            --bg-primary: #1a1a1a;
            --text-primary: #ffffff;
        }

        [data-theme="light"] {
            --bg-primary: #ffffff;
            --text-primary: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            padding: 20px;
        }

        body::-webkit-scrollbar {
            width: 12px;
        }

        body::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        body::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.5);
            border-radius: 6px;
        }

        .pip-content {
            position: relative;
            margin: 0 auto;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-wrap: normal;
            word-break: keep-all;
            hyphens: none;
            will-change: transform;
        }

        .playback-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 6px 12px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 1000;
        }

        .playback-indicator.playing {
            color: #4a9eff;
        }

        .playback-indicator .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: currentColor;
        }

        .playback-indicator.playing .dot {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Window controls */
        .window-controls {
            position: fixed;
            top: 0;
            right: 0;
            display: flex;
            gap: 0;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 2000;
            -webkit-app-region: no-drag;
        }

        body:hover .window-controls {
            opacity: 1;
        }

        .window-control-btn {
            width: 46px;
            height: 32px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background 0.2s;
        }

        .window-control-btn:hover {
            background: rgba(200, 0, 0, 0.8);
        }

        /* Draggable area */
        .drag-region {
            position: fixed;
            top: 0;
            left: 0;
            right: 46px;
            height: 32px;
            -webkit-app-region: drag;
            z-index: 1999;
            opacity: 0;
            transition: opacity 0.2s;
            background: rgba(0, 0, 0, 0.1);
        }

        body:hover .drag-region {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="drag-region"></div>
    <div class="window-controls">
        <button class="window-control-btn" id="closeBtn" title="Close">✕</button>
    </div>
    <div class="playback-indicator" id="playbackIndicator">
        <div class="dot"></div>
        <span id="playbackStatus">Paused</span>
    </div>
    <div class="pip-content" id="pipContent"></div>

    <script>
        // PiP window scroll state - runs its own animation loop
        const pipState = {
            isPlaying: false,
            speed: 0.5,
            speedMultiplier: 1,
            scrollPosition: 0,
            animationFrameId: null
        };

        // Auto-scroll function for PiP window
        function autoScrollPiP() {
            if (pipState.isPlaying) {
                const scrollAmount = pipState.speed * pipState.speedMultiplier;
                pipState.scrollPosition += scrollAmount;

                const pipContent = document.getElementById('pipContent');
                pipContent.style.transform = `translateY(-${pipState.scrollPosition}px)`;
            }
            pipState.animationFrameId = requestAnimationFrame(autoScrollPiP);
        }

        // Start the animation loop
        autoScrollPiP();

        // Close button handler
        document.getElementById('closeBtn').addEventListener('click', () => {
            window.close();
        });

        // Keyboard controls - Spacebar, C key, and W key
        let keyHoldTimer = null;
        let keyWasHeld = false;

        document.addEventListener('keydown', (e) => {
            // W key - scroll to top
            if (e.key.toLowerCase() === 'w' && !e.repeat) {
                e.preventDefault();
                pipState.scrollPosition = 0;
                const pipContent = document.getElementById('pipContent');
                pipContent.style.transform = 'translateY(0)';
                if (window.electronAPI.scrollToTop) {
                    window.electronAPI.scrollToTop();
                }
                return;
            }

            // Spacebar and C key - toggle play/pause, 2x speed on hold
            if ((e.code === 'Space' || e.key.toLowerCase() === 'c') && !e.repeat) {
                e.preventDefault();

                // Start hold timer (300ms to detect hold vs tap)
                keyHoldTimer = setTimeout(() => {
                    keyWasHeld = true;
                    // Set 2x speed locally
                    pipState.speedMultiplier = 2;
                    if (!pipState.isPlaying) {
                        pipState.isPlaying = true;
                    }
                    // Send hold command to main window
                    if (window.electronAPI.playbackHold) {
                        window.electronAPI.playbackHold();
                    }
                }, 300);
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space' || e.key.toLowerCase() === 'c') {
                e.preventDefault();

                clearTimeout(keyHoldTimer);

                if (keyWasHeld) {
                    // Was held - return to 1x speed locally
                    pipState.speedMultiplier = 1;
                    // Send release command to main window
                    if (window.electronAPI.playbackRelease) {
                        window.electronAPI.playbackRelease();
                    }
                    keyWasHeld = false;
                } else {
                    // Was a tap - toggle locally
                    pipState.isPlaying = !pipState.isPlaying;
                    // Send toggle command to main window
                    if (window.electronAPI.playbackToggle) {
                        window.electronAPI.playbackToggle();
                    }
                }
            }
        });

        // Wheel scrolling support
        let scrollTimeout;
        document.addEventListener('wheel', (e) => {
            e.preventDefault();

            // Get scroll sensitivity from main window (default 1.0)
            const sensitivity = 1.0; // Will be synced from main window

            // Adjust scroll position
            pipState.scrollPosition = Math.max(0, pipState.scrollPosition + (e.deltaY * sensitivity));
            const pipContent = document.getElementById('pipContent');
            pipContent.style.transform = `translateY(-${pipState.scrollPosition}px)`;

            // Stop playback locally
            pipState.isPlaying = false;

            // Clear any existing timeout
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                // Resume playback after 2 seconds of no scrolling
                // (if main window is still playing, it will sync back)
            }, 2000);
        });

        // Listen for initial setup
        window.electronAPI.onPiPSetup((data) => {
            const pipContent = document.getElementById('pipContent');
            const html = document.documentElement;

            pipContent.textContent = data.content;
            pipContent.style.fontFamily = data.fontFamily;
            pipContent.style.fontSize = data.fontSize;
            pipContent.style.color = data.fontColor;
            pipContent.style.maxWidth = data.lineWidth;
            html.setAttribute('data-theme', data.theme);

            // Set initial scroll position and speed
            if (data.scrollPosition !== undefined) {
                pipState.scrollPosition = data.scrollPosition;
                pipContent.style.transform = `translateY(-${data.scrollPosition}px)`;
            }
            if (data.speed !== undefined) {
                pipState.speed = data.speed;
            }
        });

        // Listen for content updates from main window
        window.electronAPI.onPiPContentUpdate((data) => {
            const pipContent = document.getElementById('pipContent');
            const html = document.documentElement;

            pipContent.textContent = data.content;
            pipContent.style.fontFamily = data.fontFamily;
            pipContent.style.fontSize = data.fontSize;
            pipContent.style.color = data.fontColor;
            pipContent.style.maxWidth = data.lineWidth;
            html.setAttribute('data-theme', data.theme);
        });

        // Listen for scroll updates - just sync position, don't apply directly
        window.electronAPI.onPiPScroll((scrollPosition) => {
            // Sync position when manually scrolled or reset
            pipState.scrollPosition = scrollPosition;
            const pipContent = document.getElementById('pipContent');
            pipContent.style.transform = `translateY(-${scrollPosition}px)`;
        });

        // Listen for playback status updates
        window.electronAPI.onPiPPlayback((isPlaying, status) => {
            const indicator = document.getElementById('playbackIndicator');
            const statusText = document.getElementById('playbackStatus');

            // Update PiP's own playback state
            pipState.isPlaying = isPlaying;

            if (isPlaying) {
                indicator.classList.add('playing');
            } else {
                indicator.classList.remove('playing');
            }
            statusText.textContent = status;
        });
    </script>
</body>
</html>
